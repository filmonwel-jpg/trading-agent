spring.application.name=trading-agent
server.address=0.0.0.0
logging.file.name=runtime/trading-agent.log

trading.host=127.0.0.1
trading.port=7497
trading.client-id=1

# Strategy tuning (active: SPY)
# trading.symbol=SPY
# trading.gap-percentage=0.001
# trading.reversal-percentage=0.0002
# trading.max-volatility-percent=0.0015

# SHOP preset (uncomment to switch)
trading.symbol=TSLA
trading.gap-percentage=0.0025
trading.reversal-percentage=0.001
trading.max-volatility-percent=10.0

trading.trade-amount=70000
trading.max-trades=10000
trading.regime.auto-enabled=true
trading.regime.window-ticks=12
trading.rsi.period=60
trading.stop-loss-percentage=0.002
trading.max-daily-drawdown=5000
trading.regime.min-directional-move=1.20
trading.regime.trend-strength-threshold=0.70
trading.market-data-request-id=1001
trading.scanner.enabled=false
trading.scanner.request-id=7001
trading.scanner.instrument=STK
trading.scanner.location=STK.US.MAJOR
trading.scanner.scan-code=HOT_BY_VOLUME
trading.scanner.max-results=10
trading.scanner.require-distance=true
trading.scanner.min-abs-distance=0.20
trading.scanner.max-abs-distance=2.50
trading.scanner.prefer-low-distance=true
trading.scanner.switch-min-interval-ms=120000

trading.reconnect.max-attempts=5
trading.reconnect.delay-ms=3000

trading.risk.enabled=true
trading.risk.max-order-notional=70000
trading.risk.max-daily-orders=1000
trading.risk.max-share-cap=500
trading.risk.window-start=09:30
trading.risk.window-end=14:00
trading.kill-switch=false

trading.state.file=runtime/trader-state.properties
trading.state.force-enabled-on-start=true
trading.orders.stale-timeout-ms=15000

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.diskspace.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=trading-agent
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS

# Custom Health Check Configuration
management.health.trading.enabled=true
management.health.ibkr.enabled=true
